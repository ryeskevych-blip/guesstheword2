<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кінець гри</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="game-container">
        <h1 class="success-title"> КІНЕЦЬ ГРИ</h1>

        <div class="index-info">
            <p>[РЕЗУЛЬТАТ]: Тестування завершено з максимальним результатом.</p>
            <p class="final-score-text">[НАБРАНО ОЧКІВ]: <span id="final-score">0</span></p>
        </div>

        <button class="start-system-btn"
            onclick="localStorage.removeItem('gameScore'); window.location.href='index.html'">
            [ ПЕРЕЗАПУСТИТИ СИСТЕМУ ]
        </button>

        <script>
            const savedScore = localStorage.getItem('gameScore') || 0;
            document.getElementById('final-score').innerText = savedScore;
        </script>
</body>

</html>
